<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;background:#05070b;font-family:'DM Mono',monospace;padding:18px 0;}
  .lbl{font:600 12px sans-serif;padding:10px 24px 4px;}
  .dp{--ink3:#535C67;--loss:#F2596A;--lossdeep:#FF3C4F;--gain:#4FD8A6;background:#090C11;padding:14px 22px;margin:0 24px 20px;border-radius:8px;}
  .chart-wrap svg{display:block;width:100%;height:auto;}
</style></head><body>
<div id="root"></div>
<script>
// ── deep drawdown: a -62% blowout amid small dips ───────────────────────────
const deep=[0,-4,-1,0,-7,-3,0,-10,-5,-2,-18,-38,-55,-62,-48,-28,-12,-4,0,-3,-1,0];
// ── normal drawdown ─────────────────────────────────────────────────────────
const shallow=[0,-0.3,-1.1,-0.4,0,-0.8,-2.1,-1.2,-0.3,-1.6,-2.5,-1.1,-0.4,0,-0.6,-1.4,-0.7,-0.2,0,-0.4,-0.1,0];

function downsampleDeepest(s,maxPoints){ if(s.length<=maxPoints) return s; const b=Math.ceil(s.length/maxPoints); const o=[]; for(let i=0;i<s.length;i+=b){let m=0;for(let j=i;j<Math.min(i+b,s.length);j++)m=Math.min(m,s[j]);o.push(m);} return o; }

// CURRENT gridline step (odd numbers for deep) vs PROPOSED nice step
function curStep(m){ return m<=3?1:m<=6?2:Math.ceil(m/3); }
function niceStep(m){ const rough=m/4, p=Math.pow(10,Math.floor(Math.log10(rough)));
  return ([1,2,2.5,5,10].map(c=>c*p).find(c=>c>=rough))||10*p; }

function dive(series, {headroom, nice}){
  const W=1000,H=360,PL=2,PR=22,PT=40,PB=28;
  const plotL=PL,plotR=W-PR,surfaceY=PT,bottomY=H-PB,span=bottomY-surfaceY,plotW=plotR-plotL;
  const usable=span*headroom;                              // <-- the fix: <1 leaves floor headroom
  const data=downsampleDeepest(series.length>1?series:[0,0],22); const n=data.length;
  const maxAbs=Math.max(0.01,...data.map(x=>Math.abs(x)));
  const P=data.map((x,i)=>[plotL+(i/(n-1))*plotW, surfaceY+(Math.abs(x)/maxAbs)*usable]);
  let line=`M ${P[0][0].toFixed(1)} ${P[0][1].toFixed(1)}`;
  for(let i=0;i<P.length-1;i++){const p0=P[i-1]||P[i],p1=P[i],p2=P[i+1],p3=P[i+2]||P[i+1];
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    line+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;}
  const area=`${line} L ${plotR} ${bottomY} L ${plotL} ${bottomY} Z`;
  const step=nice?niceStep(maxAbs):curStep(maxAbs); const yl=[]; for(let v=step;v<maxAbs;v+=step) yl.push(v);
  let di=0;for(let i=1;i<data.length;i++)if(data[i]<data[di])di=i; const [dx,dy]=P[di]; const [cx,cy]=P[n-1];
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
   <defs><linearGradient id="g${headroom}${nice}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(242,89,106,.02)"/><stop offset="60%" stop-color="rgba(242,89,106,.16)"/><stop offset="100%" stop-color="rgba(255,60,79,.34)"/></linearGradient></defs>
   ${yl.map(v=>{const y=surfaceY+(v/maxAbs)*usable;return `<line x1="${plotL}" y1="${y}" x2="${plotR}" y2="${y}" stroke="rgba(148,163,184,.16)" stroke-dasharray="2 5"/><text x="${plotL+4}" y="${y-4}" fill="var(--ink3)" font-size="9.5">-${v%1?v.toFixed(2):v.toFixed(0)+'.00'}%</text>`;}).join('')}
   <path d="${area}" fill="url(#g${headroom}${nice})"/>
   <path d="${line}" fill="none" stroke="var(--loss)" stroke-width="1.5" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
   <line x1="${dx}" y1="${surfaceY}" x2="${dx}" y2="${dy}" stroke="rgba(255,60,79,.35)" stroke-dasharray="2 3" vector-effect="non-scaling-stroke"/>
   <circle cx="${dx}" cy="${dy}" r="3" fill="var(--lossdeep)"/>
   <line x1="${plotL}" y1="${surfaceY}" x2="${plotR}" y2="${surfaceY}" stroke="var(--gain)" stroke-width="1" stroke-opacity=".6" vector-effect="non-scaling-stroke"/>
   <text x="${plotL+4}" y="${surfaceY-6}" fill="var(--gain)" font-size="9.5" letter-spacing="1">0.00% · PEAK</text>
   <circle cx="${cx}" cy="${cy}" r="4" fill="var(--gain)"/>
  </svg>`;
}
const R=document.getElementById('root');
R.innerHTML =
  `<div class="lbl" style="color:#f4617f">CURRENT — deep -62% drawdown (deepest pinned to floor → curve clips + collides with axis)</div><div class="dp"><div class="chart-wrap">${dive(deep,{headroom:1.0,nice:false})}</div></div>`+
  `<div class="lbl" style="color:#4FD8A6">PROPOSED — same -62% (floor headroom + clean gridlines, nothing clips)</div><div class="dp"><div class="chart-wrap">${dive(deep,{headroom:0.86,nice:true})}</div></div>`+
  `<div class="lbl" style="color:#4FD8A6">PROPOSED — normal -2.5% (still reads exactly the same)</div><div class="dp"><div class="chart-wrap">${dive(shallow,{headroom:0.86,nice:true})}</div></div>`;
</script></body></html>
