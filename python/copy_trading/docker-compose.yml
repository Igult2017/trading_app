# Copy Trading Bridge — Docker Compose (single VPS, Phase 1)
# Runs alongside the existing Node.js trading journal on the same host.
#
# Usage:
#   cp .env.example .env        # fill in secrets
#   docker compose up -d
#
# Scaling (future):
#   docker compose up -d --scale worker=4
#
# MT5 bridge (Linux):
#   The worker connects to the mt5-remote bridge running on the VPS host at
#   MT5_BRIDGE_HOST:MT5_BRIDGE_PORT (default 127.0.0.1:18812).
#   network_mode: host lets the containers reach that local socket.

version: "3.9"

services:

  # ── Redis queue ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── FastAPI bridge (control plane + signal ingestion API) ───────────────────
  api:
    build:
      context: ../..
      dockerfile: python/copy_trading/Dockerfile
    restart: unless-stopped
    command: >
      uvicorn python.copy_trading.api_service.main:app
      --host 0.0.0.0 --port 8001 --workers 1
    ports:
      - "127.0.0.1:8001:8001"
    env_file: ../../.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      retries: 3

  # ── Worker (queue consumer + MT5 executor) ───────────────────────────────────
  worker:
    build:
      context: ../..
      dockerfile: python/copy_trading/Dockerfile
    restart: unless-stopped
    # network_mode host lets the container reach the mt5-remote bridge on the
    # VPS host (127.0.0.1:18812) and the Telegram session files on disk.
    network_mode: host
    command: python -m python.copy_trading.main
    env_file: ../../.env
    environment:
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      # MT5_BRIDGE_HOST / MT5_BRIDGE_PORT are read from .env (defaults: 127.0.0.1 / 18812)
    volumes:
      # Persist Telegram session files across container restarts
      - tg_sessions:/var/lib/tradesync/tg_sessions
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      replicas: 1          # increase to 4 when scaling beyond 100 users

volumes:
  redis_data:
  tg_sessions:            # named volume — survives container restarts and rebuilds
