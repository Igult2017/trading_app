# Copy Trading Bridge — Docker Compose
# Single VPS, Path B (one MT5 terminal, serialised via asyncio lock).
# Supports up to ~8 active followers comfortably on a 4–8 GB VPS.
#
# Usage:
#   cp ../../.env.example ../../.env   # fill in all secrets
#   docker compose up -d
#
# Teardown:
#   docker compose down
#
# Upgrade MT5 (flushes Wine prefix — only if MT5 needs reinstall):
#   docker compose down && docker volume rm copy_trading_mt5_data
#   docker compose up -d

version: "3.9"

services:

  # ── 1. MT5 Terminal (Wine + MT5 + mt5linux RPyC server) ──────────────────────
  mt5:
    image: gmag11/metatrader5_vnc:latest
    restart: unless-stopped
    ports:
      # VNC browser UI — view/configure the MT5 terminal visually
      - "127.0.0.1:3010:3000"
      # mt5linux RPyC — Python bridge connects here (internal only)
      - "127.0.0.1:8812:8812"
    volumes:
      - mt5_data:/config
    environment:
      - CUSTOM_USER=admin
      - PASSWORD=${VNC_PASSWORD}
    networks:
      - bridge_net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8812 || exit 1"]
      interval: 20s
      retries: 10
      start_period: 60s

  # ── 2. Redis (signal queue) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - bridge_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── 3. FastAPI control plane (signal ingestion + status API) ─────────────────
  api:
    build:
      context: ../..
      dockerfile: python/copy_trading/Dockerfile
    restart: unless-stopped
    command: >
      uvicorn python.copy_trading.api_service.main:app
      --host 0.0.0.0 --port 8001 --workers 1
    ports:
      - "127.0.0.1:8001:8001"
    env_file: ../../.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # mt5linux connects to the mt5 service by Docker service name
      - MT5_BRIDGE_HOST=mt5
      - MT5_BRIDGE_PORT=8812
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bridge_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      retries: 3

  # ── 4. Worker (queue consumer + MT5 executor) ─────────────────────────────────
  worker:
    build:
      context: ../..
      dockerfile: python/copy_trading/Dockerfile
    restart: unless-stopped
    command: python -m python.copy_trading.main
    env_file: ../../.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Point at the MT5 container — no longer needs host networking
      - MT5_BRIDGE_HOST=mt5
      - MT5_BRIDGE_PORT=8812
    volumes:
      - tg_sessions:/var/lib/tradesync/tg_sessions
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      mt5:
        condition: service_healthy
    networks:
      - bridge_net
    deploy:
      replicas: 1   # single worker — Path B serialises via asyncio lock

networks:
  bridge_net:
    driver: bridge

volumes:
  mt5_data:       # MT5 Wine prefix + config (survives container restarts)
  redis_data:
  tg_sessions:
