# /etc/nginx/sites-available/trading-app
# Symlink: ln -s /etc/nginx/sites-available/trading-app /etc/nginx/sites-enabled/

# ── Rate limit zones (keyed on real client IP) ───────────────────────────────
# api_limit:  120 req/min per IP  (~2 req/s sustained, burst to 30)
# ws_limit:    10 WS upgrades/min per IP
limit_req_zone  $binary_remote_addr  zone=api_limit:10m  rate=2r/s;
limit_req_zone  $binary_remote_addr  zone=ws_limit:1m    rate=10r/m;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream node_app {
    server 127.0.0.1:5000;
    keepalive 64;          # persistent connections to Node — eliminates TCP handshake per request
}

# ── Cloudflare real-IP passthrough ───────────────────────────────────────────
# Nginx sees Cloudflare's edge IP by default; these directives recover the
# real visitor IP so logs, rate limits, and req.ip in Express are accurate.
set_real_ip_from  103.21.244.0/22;
set_real_ip_from  103.22.200.0/22;
set_real_ip_from  103.31.4.0/22;
set_real_ip_from  104.16.0.0/13;
set_real_ip_from  104.24.0.0/14;
set_real_ip_from  108.162.192.0/18;
set_real_ip_from  131.0.72.0/22;
set_real_ip_from  141.101.64.0/18;
set_real_ip_from  162.158.0.0/15;
set_real_ip_from  172.64.0.0/13;
set_real_ip_from  173.245.48.0/20;
set_real_ip_from  188.114.96.0/20;
set_real_ip_from  190.93.240.0/20;
set_real_ip_from  197.234.240.0/22;
set_real_ip_from  198.41.128.0/17;
set_real_ip_from  2400:cb00::/32;
set_real_ip_from  2606:4700::/32;
set_real_ip_from  2803:f800::/32;
set_real_ip_from  2405:b500::/32;
set_real_ip_from  2405:8100::/32;
set_real_ip_from  2a06:98c0::/29;
set_real_ip_from  2c0f:f248::/32;
real_ip_header    CF-Connecting-IP;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.com;          # ← replace with your domain

    # Cloudflare Origin Certificate (15-year, free in Cloudflare dashboard)
    # Download from: Cloudflare → SSL/TLS → Origin Server → Create Certificate
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/trading-app/dist/public;  # ← path to your built client files
    index index.html;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml font/woff2;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Static assets — served by Nginx, never touch Node ────────────────────
    # Vite outputs hashed filenames (main.abc123.js) so we can cache forever.
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── User-uploaded blog images ─────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/trading-app/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── WebSocket (trading signals, live prices) ──────────────────────────────
    location /ws {
        limit_req zone=ws_limit burst=5 nodelay;

        proxy_pass             http://node_app;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     3600s;    # keep WS alive for 1 hour
        proxy_send_timeout     3600s;
    }

    # ── API — proxy to Node ───────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass             http://node_app;
        proxy_http_version     1.1;
        proxy_set_header       Connection        "";   # enable keepalive upstream
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_connect_timeout  5s;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;
        proxy_buffering        on;
        proxy_buffer_size      16k;
        proxy_buffers          8 16k;
    }

    # ── SPA fallback — all other paths serve index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
