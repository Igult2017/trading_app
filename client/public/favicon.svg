<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13243A"/>
      <stop offset="1" stop-color="#0A1626"/>
    </linearGradient>
    <linearGradient id="upA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2EE08A"/>
      <stop offset="1" stop-color="#12B266"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bgA)"/>
  <!-- bullish candle (hero) -->
  <rect x="232" y="118" width="22" height="290" rx="11" fill="url(#upA)"/>
  <rect x="186" y="180" width="114" height="172" rx="20" fill="url(#upA)"/>
  <!-- small leading candle to imply uptrend -->
  <rect x="120" y="250" width="14" height="120" rx="7" fill="#1C8F58"/>
  <rect x="96" y="286" width="62" height="60" rx="12" fill="#1C8F58"/>
</svg>
