<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0F172A"/>

  <!-- Subtle grid lines -->
  <line x1="8" y1="20" x2="56" y2="20" stroke="#1e293b" stroke-width="1"/>
  <line x1="8" y1="34" x2="56" y2="34" stroke="#1e293b" stroke-width="1"/>
  <line x1="8" y1="48" x2="56" y2="48" stroke="#1e293b" stroke-width="1"/>

  <!-- Upward trend line -->
  <polyline
    points="8,50 18,40 28,44 40,26 54,12"
    fill="none"
    stroke="#22c55e"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Glowing dot at the tip (latest price) -->
  <circle cx="54" cy="12" r="5" fill="#22c55e" opacity="0.25"/>
  <circle cx="54" cy="12" r="3" fill="#22c55e"/>
</svg>
