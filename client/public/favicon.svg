<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Bar 1 – shortest (left) -->
  <rect x="5" y="18" width="5" height="9" rx="1.5" fill="#3b82f6"/>

  <!-- Bar 2 – tallest (middle) -->
  <rect x="13.5" y="9" width="5" height="18" rx="1.5" fill="#2563eb"/>

  <!-- Bar 3 – medium (right) -->
  <rect x="22" y="14" width="5" height="13" rx="1.5" fill="#60a5fa"/>

  <!-- Upward trend line -->
  <polyline points="7.5,22 16,13 24.5,17" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
</svg>
