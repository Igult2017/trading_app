[Common]
; MaxBars: bars loaded per chart symbol.
; Default is 65536 — that's ~200 MB RAM across all watched symbols.
; 500 covers everything the signal platform needs (longest lookback is ~200 bars).
MaxBars=500

; News=0: disable the news feed connection (saves ~10 MB RAM + background polling).
News=0

; SendReports=0: disable MQL5 community usage statistics.
SendReports=0

; DisableAutoUpdate=1: skip MT5 auto-update check on startup (faster boot).
DisableAutoUpdate=1
