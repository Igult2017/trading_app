# TradeSync — Full Stack Docker Compose
# Single VPS deployment: one command brings up everything.
#
# SETUP (one time):
#   cp .env.example .env
#   # Edit .env — fill in SESSION_SECRET, COPY_ENCRYPTION_KEY,
#   #              DB_PASSWORD, SUPABASE_*, GOOGLE_API_KEY
#   docker compose up -d
#
# NOTE: MT5 Wine/Docker is currently disabled.
#   Data source chain: cTrader Open API → yfinance + ejtraderCT overlay.
#   To re-enable MT5: un-comment the mt5 service block below, restore
#   signal_platform/requirements.txt mt5linux, restore the depends_on mt5
#   entries in signal_platform and bridge.
#
# LOGS:
#   docker compose logs -f bridge
#
# UPDATE (run this on Hostinger after every git pull):
#   git pull && docker compose up -d --build

version: "3.9"

services:

  # ── 1. PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-tradesync}
      POSTGRES_USER:     ${DB_USER:-tradesync}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tradesync} -d ${DB_NAME:-tradesync}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 2. Redis (trade signal queue) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── 3. MT5 Terminal (Wine + MT5 + mt5linux RPyC) — DISABLED ──────────────────
  # To re-enable: un-comment this entire block, restore mt5linux in
  # signal_platform/requirements.txt, and restore the depends_on mt5
  # entries in signal_platform and bridge below.
  #
  # mt5:
  #   image: gmag11/metatrader5_vnc:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:3010:3000"
  #   environment:
  #     CUSTOM_USER: admin
  #     PASSWORD:    ${VNC_PASSWORD:-tradesync_vnc_2025}
  #   volumes:
  #     - mt5_data:/config
  #     - ./mt5_common.ini:/config/.wine/drive_c/Program Files/MetaTrader 5/config/common.ini:ro
  #   mem_limit: 700m
  #   memswap_limit: 700m
  #   cpus: "1.0"
  #   networks:
  #     - internal
  #   healthcheck:
  #     test: ["CMD-SHELL", "nc -z localhost 8812 || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 20
  #     start_period: 600s

  # ── 4. Signal Platform (strategy scanner + Telegram alerts) ─────────────────
  # Data source: cTrader Open API (primary) → yfinance + ejtraderCT (fallback).
  signal_platform:
    build:
      context: .
      dockerfile: signal_platform/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL:  "postgresql://${DB_USER:-tradesync}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tradesync}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ── 5. Node.js App (trading dashboard + API) ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false   # Coolify generates this file from its env var UI;
                          # skipped silently when deploying without a .env file.
    environment:
      # ── Fixed / computed values ─────────────────────────────────────────────
      # These override anything in the env_file above for docker-compose deploys.
      DATABASE_URL: "postgresql://${DB_USER:-tradesync}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tradesync}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── 5. Bridge — single process (FastAPI + monitors + workers) ────────────────
  # Runs the FastAPI control plane AND all background tasks in one container.
  # This avoids cross-container in-memory state bugs — the HTTP endpoints
  # directly control the tasks running in the same asyncio event loop.
  bridge:
    build:
      context: .
      dockerfile: python/copy_trading/Dockerfile
    restart: unless-stopped
    command:
      - uvicorn
      - python.copy_trading.api_service.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8001"
      - --workers
      - "1"
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-tradesync}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tradesync}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MT5_BRIDGE_HOST: mt5
      MT5_BRIDGE_PORT: "8812"
      APP_URL: "http://app:5000"
      BRIDGE_SECRET:
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - tg_sessions:/var/lib/tradesync/tg_sessions
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# ── All containers talk on an isolated Docker bridge network ─────────────────
# Nothing is reachable from the internet except the app on PORT and
# the VNC on 127.0.0.1:3010 (localhost only — use SSH tunnel to access).
networks:
  internal:
    driver: bridge

volumes:
  pg_data:       # PostgreSQL data
  redis_data:    # Redis AOF persistence
  # mt5_data:   # MT5 Wine prefix — un-comment when re-enabling the mt5 service
  tg_sessions:   # Telegram session files for signal listener
