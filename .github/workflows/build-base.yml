name: Build base image

# Rebuilds ghcr.io/igult2017/trading-app-base:latest whenever the base
# Dockerfile or Python deps change. Coolify's app builds then use this
# cached image and skip the slow Python/system install on every deploy.

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.base
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.base
          push: true
          platforms: linux/amd64
          tags: ghcr.io/igult2017/trading-app-base:latest
          cache-from: type=registry,ref=ghcr.io/igult2017/trading-app-base:buildcache
          cache-to: type=registry,ref=ghcr.io/igult2017/trading-app-base:buildcache,mode=max
