        - article [ref=e149]:
          - heading "Create your application ¶" [level=1] [ref=e150]:
            - text: Create your application
            - link "¶" [ref=e151] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/creating-new-app/#create-your-application
          - paragraph [ref=e152]: Creating your application from scratch may seem daunting. To make this process significantly less challenging, you can divide it into smaller steps, forming an easy-to-follow roadmap.
          - paragraph [ref=e153]: Below, we provide the key stages that this roadmap could include.
          - heading "Choose the purpose of your application ¶" [level=2] [ref=e155]:
            - text: Choose the purpose of your application
            - link "¶" [ref=e156] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/creating-new-app/#choose-the-purpose-of-your-application
          - paragraph [ref=e157]: For your app to be downloaded and used, it has to deliver value to the end users. As a result, any good application starts with defining the need it is supposed to address.
          - generic [ref=e158]:
            - paragraph [ref=e159]: Address user needs
            - paragraph [ref=e160]: Here are some examples of the user needs you may choose to address.
            - list [ref=e161]:
              - listitem [ref=e162]: Traders may want to keep track of their performance all the time, not just inside cTrader. An app for wearable devices may prove very successful.
              - listitem [ref=e163]: Users with a followership could need a way to automatically inform their subscribers of new trades. You can easily provide such functionality using cTrader Open API and an API provided by a popular messenger service.
              - listitem [ref=e164]: Pro traders who partner with a broker may want a custom trading terminal that funnels users into creating new accounts with this broker. By integrating with the Open API you can easily satisfy this request.
          - paragraph [ref=e165]: The purpose of your application does not necessarily have to be unique but it has to be specific and achievable.
          - heading "Define the key functionality and processes ¶" [level=2] [ref=e166]:
            - text: Define the key functionality and processes
            - link "¶" [ref=e167] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/creating-new-app/#define-the-key-functionality-and-processes
          - paragraph [ref=e168]: After deciding on the need that your application will address, you should create a simple bullet point list outlining its key functionality.
          - paragraph [ref=e169]: "This bullet point list should not be very long (four to five points maximum) and should answer the following questions:"
          - list [ref=e170]:
            - listitem [ref=e171]: What information will my app show to end users?
            - listitem [ref=e172]: What actions should end users be able to perform inside the application?
            - listitem [ref=e173]: What controls will my application have for end users to interact with?
          - generic [ref=e174]:
            - paragraph [ref=e175]: Be mindful of constraints
            - paragraph [ref=e176]: When answering the questions above, always keep in mind the limitations imposed by your preferred programming language and UI framework.
          - heading "Create the application UI ¶" [level=2] [ref=e177]:
            - text: Create the application UI
            - link "¶" [ref=e178] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/creating-new-app/#create-the-application-ui
          - paragraph [ref=e179]: "You now know what your app is supposed to do and what essential features it will include. The next logical step is to create its UI. Broadly speaking, this process usually involves the following:"
          - list [ref=e180]:
            - listitem [ref=e181]: Define the parameters of the devices where your app will be displayed (for example, typical screen sizes).
            - listitem [ref=e182]: Create mockups of all key screens. You can do this by hand using pen and paper or with a wireframe software.
            - listitem [ref=e183]: Clean up your mockups and turn them into a set of screens containing all major controls. You can outsource this step to a professional graphic designer if you have such an opportunity.
          - heading "Register your application ¶" [level=2] [ref=e184]:
            - text: Register your application
            - link "¶" [ref=e185] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/creating-new-app/#register-your-application
          - paragraph [ref=e186]:
            - text: After deciding the purpose of your application and its key functionality, you should be ready to register the service at the
            - link "cTrader Open API Portal" [ref=e187] [cursor=pointer]:
              - /url: https://openapi.ctrader.com
              - strong [ref=e188]: cTrader Open API Portal
            - text: . You can read a detailed overview of this process
            - link "in a separate guide" [ref=e189] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/api-application/
              - strong [ref=e190]: in a separate guide
            - text: .
          - paragraph [ref=e191]: As detailed in our guide to app and account authentication, do not forget to specify a valid redirect URL for account authentication.
          - generic [ref=e192]:
            - paragraph [ref=e193]: Describe your application
            - paragraph [ref=e194]: When registering your application, make sure to provide as many details as possible. Spotware carefully evaluates new Open API services and there is a higher chance of your application getting approved if you explicitly describe why it is needed and what it will allow users to do.
          - heading "Code the key functionality ¶" [level=2] [ref=e195]:
            - text: Code the key functionality
            - link "¶" [ref=e196] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/creating-new-app/#code-the-key-functionality
          - paragraph [ref=e197]: After receiving approval from Spotware, you should proceed with coding your application. As usual, we recommend using the official cTrader Open API SDKs as they contain helpful methods and classes allowing you to save time on implementing essential features.
          - paragraph [ref=e198]: Here is a small roadmap you can follow when coding a new application.
          - list [ref=e199]:
            - listitem [ref=e200]:
              - text: Create a system for
              - link "opening a connection" [ref=e201] [cursor=pointer]:
                - /url: https://help.ctrader.com/open-api/connection/
                - strong [ref=e202]: opening a connection
              - text: .
            - listitem [ref=e203]:
              - text: Establish a
              - link "connection to a proxy" [ref=e204] [cursor=pointer]:
                - /url: https://help.ctrader.com/open-api/proxies-endpoints/
                - strong [ref=e205]: connection to a proxy
              - text: .
            - listitem [ref=e206]:
              - text: Add a solution for
              - link "sending/receiving messages" [ref=e207] [cursor=pointer]:
                - /url: https://help.ctrader.com/open-api/sending-receiving-protobuf/
                - strong [ref=e208]: sending/receiving messages
              - text: .
            - listitem [ref=e209]:
              - text: Implement a service for
              - link "app and account authentication" [ref=e210] [cursor=pointer]:
                - /url: https://help.ctrader.com/open-api/account-authentication/
                - strong [ref=e211]: app and account authentication
              - text: .
            - listitem [ref=e212]: Add custom logic that handles your app’s functionality.
          - heading "Debug and test your application ¶" [level=2] [ref=e213]:
            - text: Debug and test your application
            - link "¶" [ref=e214] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/creating-new-app/#debug-and-test-your-application
          - paragraph [ref=e215]: Debugging is essential for ensuring that your app behaves as expected. Any modern IDE typically allows for setting breakpoints at certain lines in your code so that you can easily see how your commands are executed. When a breakpoint is hit, execution is paused until you resume it manually.
          - paragraph [ref=e216]: If you have such an opportunity, you could also recruit your friends as impromptu quality assurance engineers. They can review how your application behaves on different devices and identify errors that may be difficult to spot when debugging alone.
          - heading "Deploy and distribute your application ¶" [level=2] [ref=e217]:
            - text: Deploy and distribute your application
            - link "¶" [ref=e218] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/creating-new-app/#deploy-and-distribute-your-application
          - paragraph [ref=e219]: The process of deployment essentially means making your app available to end users. The details of this process depend on the platform that your app is supposed to run on.
          - list [ref=e220]:
            - listitem [ref=e221]:
              - text: For desktop devices you can simply build your application in release mode and
              - link "add a custom installer" [ref=e222] [cursor=pointer]:
                - /url: https://learn.microsoft.com/en-us/visualstudio/deployment/installer-projects-net-core?view=vs-2022
                - strong [ref=e223]: add a custom installer
              - text: .
            - listitem [ref=e224]:
              - text: For Android smartphones, you have to sign and release your application following
              - link "the official Google guidelines" [ref=e225] [cursor=pointer]:
                - /url: https://developer.android.com/studio/publish
                - strong [ref=e226]: the official Google guidelines
              - text: .
            - listitem [ref=e227]:
              - text: For iOS devices, you first need to prepare the app bundle and register your service on
              - link "App Store Connect" [ref=e228] [cursor=pointer]:
                - /url: https://docs.flutter.dev/deployment/ios
                - strong [ref=e229]: App Store Connect
              - text: .
            - listitem [ref=e230]:
              - text: For a web project, choose a suitable deployment service (for example,
              - link "AWS Elastic Beanstalk" [ref=e231] [cursor=pointer]:
                - /url: https://aws.amazon.com/getting-started/guides/deploy-webapp-elb/
                - strong [ref=e232]: AWS Elastic Beanstalk
              - text: ) and follow its guidelines. Alternatively, procure suitable hosting and deploy your app on a remote server.
