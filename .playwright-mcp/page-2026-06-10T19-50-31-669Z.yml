        - article [ref=e190]:
          - heading "App and account authentication ¶" [level=1] [ref=e191]:
            - text: App and account authentication
            - link "¶" [ref=e192] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/account-authentication/#app-and-account-authentication
          - paragraph [ref=e193]:
            - text: The cTrader Open API authentication process is based on
            - link "the OAuth 2.0 standard" [ref=e194] [cursor=pointer]:
              - /url: https://oauth.net/2/
              - strong [ref=e195]: the OAuth 2.0 standard
            - text: .
          - paragraph [ref=e196]: This framework allows third-party applications to attain limited access to a service either on behalf of the resource owner, by orchestrating an approval interaction between the resource owner and the service, or by allowing a third-party application to attain access on its own behalf.
          - heading "Authentication flow ¶" [level=2] [ref=e197]:
            - text: Authentication flow
            - link "¶" [ref=e198] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/account-authentication/#authentication-flow
          - paragraph [ref=e199]: As per the OAuth 2.0 standard, account authentication requires both an authorisation code and an access token.
          - generic [ref=e200]:
            - paragraph [ref=e201]: Define tokens
            - paragraph [ref=e202]: An authorisation code is a short-term token that is issued for an individual cTID. Its expiration period is one minute. An access token is a long-term token that allows an application to send and receive messages to and from the cTrader backend. After receiving it, an authorisation code must be quickly exchanged for an access token; afterwards, all messages sent to the cTrader backend have to be signed with the received access token to authenticate your application. The expiration period of an access token is 2,628,000 seconds (approximately 30 days). After it is expired, a new access token can be generated using a refresh token. The refresh token does not have an expiration period.
          - paragraph [ref=e203]: "Typically, the process of someone new starting to use your application for the first time looks as follows:"
          - paragraph [ref=e204]: 1. A user with a certain cTID accesses your application wherever it is deployed; the user interacts with an action button or equivalent.
          - paragraph [ref=e205]: 2. The application uses an embedded browser (or any other suitable means) to redirect the user to a specific URI where they will give the app the necessary permissions.
          - generic [ref=e206]:
            - paragraph [ref=e207]: Gain trust
            - paragraph [ref=e208]: Before redirecting the user to this URI, make sure that the user trusts your app and is aware of the fact that they will need to provide additional permissions.
          - paragraph [ref=e209]:
            - text: 3. The user is transferred to a predefined redirect URL. This URL contains the access token as the value of the
            - code [ref=e210]: code
            - text: query parameter.
          - paragraph [ref=e211]:
            - text: 4. The user is transferred back to the app either of their own accord or automatically. The app is informed of the value of the
            - code [ref=e212]: code
            - text: parameter.
          - paragraph [ref=e213]: 5. The app sends a request for exchanging the authorization code with an access token to a specific endpoint.
          - paragraph [ref=e214]:
            - text: 6. The app receives a response containing the access token as the value of the
            - code [ref=e215]: accessToken
            - text: key.
          - paragraph [ref=e216]:
            - text: 7. The app sends the
            - link "ProtoOAApplicationAuthReq message" [ref=e217] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/messages/#protooaapplicationauthreq
              - strong [ref=e218]:
                - code [ref=e219]: ProtoOAApplicationAuthReq
                - text: message
            - text: containing the
            - code [ref=e220]: clientId
            - text: and
            - code [ref=e221]: clientSecret
            - text: fields.
          - paragraph [ref=e222]:
            - text: 8. The app sends the
            - link "ProtoOAGetAccountListByAccessTokenReq message" [ref=e223] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/messages/#protooagetaccountlistbyaccesstokenreq
              - strong [ref=e224]:
                - code [ref=e225]: ProtoOAGetAccountListByAccessTokenReq
                - text: message
            - text: containing the
            - code [ref=e226]: accessToken
            - text: field. The response (
            - link "ProtoOAGetAccountListByAccessTokenRes" [ref=e227] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/messages/#protooagetaccountlistbyaccesstokenres
              - strong [ref=e228]:
                - code [ref=e229]: ProtoOAGetAccountListByAccessTokenRes
            - text: ) contains the repeated
            - code [ref=e230]: ctidTraderAccountId
            - text: field.
          - paragraph [ref=e231]:
            - text: 9. After receiving a response, the app sends the
            - link "ProtoOAAccountAuthReq message" [ref=e232] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/messages/
              - strong [ref=e233]:
                - code [ref=e234]: ProtoOAAccountAuthReq
                - text: message
            - text: containing the
            - code [ref=e235]: ctidTraderAccountId
            - text: and
            - code [ref=e236]: accessToken
            - text: fields.
          - paragraph [ref=e237]:
            - text: Afterwards, the user should be authenticated under the account the
            - code [ref=e238]: ctidTraderAccountId
            - text: of which matches the
            - code [ref=e239]: ctidTraderAccountId
            - text: provided during step 8.
          - paragraph [ref=e240]: The diagram below explains how the basic authentication flow works from the perspective of your Open API application.
          - paragraph [ref=e242]: In the sub-sections below, we explain the key steps of the authentication flow in detail.
          - heading "Add a redirect URI ¶" [level=3] [ref=e243]:
            - text: Add a redirect URI
            - link "¶" [ref=e244] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/account-authentication/#add-a-redirect-uri
          - paragraph [ref=e245]:
            - text: As shown previously, your app needs to attain an authorisation code after a user is sent to a certain redirect URI. This URI will include the authorisation code as the value of the
            - code [ref=e246]: code
            - text: query parameter.
          - paragraph [ref=e247]: "To add a new redirect URI, do the following:"
          - paragraph [ref=e248]:
            - text: 1. Open the
            - strong [ref=e249]: Applications
            - text: page in the Open API portal.
          - paragraph [ref=e250]:
            - text: 2. Select the
            - strong [ref=e251]: Edit
            - text: button in the row with the application to which you would like to add a redirect URL.
          - paragraph [ref=e252]:
            - text: 3. In the newly appeared screen, scroll down to the
            - strong [ref=e253]: Redirect URIs
            - text: section.
          - figure [ref=e254]:
            - paragraph [ref=e255]
          - paragraph [ref=e256]:
            - text: 4. Add a redirect URL in an available empty text input field. If no available fields are shown, select the
            - strong [ref=e257]: Add redirect URI
            - text: button.
          - paragraph [ref=e258]:
            - text: 5. Select the
            - strong [ref=e259]: Save
            - text: button at the bottom of the page to apply your changes.
          - generic [ref=e260]:
            - paragraph [ref=e261]: Manage redirect URIs
            - paragraph [ref=e262]: The very first redirect URI is for the Playground service that allows you to test your application before giving regular users access to it. It must never be used for a production application. You can add an unlimited number of redirect URIs if required.
          - heading "Attain the authorisation code ¶" [level=3] [ref=e263]:
            - text: Attain the authorisation code
            - link "¶" [ref=e264] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/account-authentication/#attain-the-authorisation-code
          - paragraph [ref=e265]: To receive an authorisation code for a specific cTID, your app will need to send a user to the following URI.
          - generic [ref=e267]:
            - navigation [ref=e268]:
              - button "Copy to clipboard" [ref=e269] [cursor=pointer]
            - code [ref=e270]: "https://id.ctrader.com/my/settings/openapi/grantingaccess/?client_id={clientId}&redirect_uri={your_redirectURI}&scope={scope}&product=web"
          - generic [ref=e271]:
            - paragraph [ref=e272]: Note
            - paragraph [ref=e273]: At this stage, the user will need to permit your application or service to access their trading accounts. As a result, it is imperative you provide the user with a full understanding of what using your application or service will require regarding permissions, data storage and data processing.
          - paragraph [ref=e274]: This URI has the following query parameters.
          - table [ref=e277]:
            - rowgroup [ref=e278]:
              - row "Parameter Required? Definition" [ref=e279]:
                - columnheader "Parameter" [ref=e280]:
                  - strong [ref=e281]: Parameter
