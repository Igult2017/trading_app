          - paragraph [ref=e311]:
            - text: To view your
            - code [ref=e312]: client_id
            - text: ", go to the"
            - strong [ref=e313]: Applications
            - text: page and select the
            - strong [ref=e314]: View
            - text: button in the
            - strong [ref=e315]: Credentials
            - text: column.
          - paragraph [ref=e316]: After a user is sent to the URI above (and as long as both parameters are valid), they should see a login/signup screen prompting them to authorise under their cTID. Following that, a user will be shown a dialog where they will be able to permit the application to gain access to one or more accounts linked to their cTID.
          - paragraph [ref=e317]:
            - text: When the user selects the
            - strong [ref=e318]: Allow access
            - text: button, they will be redirected to the
            - code [ref=e319]: redirect_uri
            - text: you had specified originally. As shown in the below example, the authorization code will be added to this URI as a query parameter.
          - paragraph [ref=e320]:
            - code [ref=e321]: https://my-redirect-uri.com/?code=123ASDASffdg_as234_GCllkoq14adRB7_tvN
          - paragraph [ref=e322]:
            - text: At this point, your application would need to access and store the value of the
            - code [ref=e323]: code
            - text: parameter. It must be quickly exchanged with an access token before the authorisation code expires.
          - generic [ref=e324]:
            - paragraph [ref=e325]: Additional accounts
            - paragraph [ref=e326]: If a user creates additional accounts after completing the actions described above, these accounts will not be authorised inside the application. Instead, the user would need to be redirected back to the URL provided above so that they could give the application access to any additional accounts that they have created since last login.
