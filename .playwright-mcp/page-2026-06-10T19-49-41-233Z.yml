        - article [ref=e124]:
          - heading "Getting started ¶" [level=1] [ref=e125]:
            - text: Getting started
            - link "¶" [ref=e126] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/#getting-started
          - paragraph [ref=e127]: cTrader Open API is a service you can use to develop custom applications connected to the cTrader backend. This documentation provides everything you need to know including information about SDKs, structured tutorials, code snippets and more.
          - heading "What is Open API? ¶" [level=2] [ref=e128]:
            - text: What is Open API?
            - link "¶" [ref=e129] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/#what-is-open-api
          - paragraph [ref=e130]: cTrader Open API is a service that allows anyone with a cTrader ID (cTID) to create an application sending and receiving information to and from the cTrader backend. You can use this API to develop trading-oriented apps or services or integrate the cTrader backend with any existing solutions you may have.
          - paragraph [ref=e131]:
            - text: Using this API involves sending and receiving messages to and from the cTrader backend. This is done by sending and receiving either JSON objects or
            - link "Google Protocol Buffers (Protobufs)" [ref=e132] [cursor=pointer]:
              - /url: https://developers.google.com/protocol-buffers
              - strong [ref=e133]: Google Protocol Buffers (Protobufs)
            - text: . Both of these means of data serialisation and deserialisation are language-neutral, meaning that you can use any programming language you want to interact with the API.
          - generic [ref=e134]:
            - paragraph [ref=e135]: Message names
            - paragraph [ref=e136]:
              - text: When this documentation references specific messages (for example,
              - link "ProtoOAApplicationAuthReq" [ref=e137] [cursor=pointer]:
                - /url: https://help.ctrader.com/open-api/messages/#protooaapplicationauthreq
                - strong [ref=e138]:
                  - code [ref=e139]: ProtoOAApplicationAuthReq
              - text: ), it uses the Protobuf notation with
              - code [ref=e140]: ProtoOA...
              - text: at the start of a message name.
          - paragraph [ref=e141]: cTrader Open API is available for anyone registered with a cTrader-affiliated broker.
          - generic [ref=e142]:
            - paragraph [ref=e143]: Use cases
            - paragraph [ref=e144]: "Here are just some of the possible applications you may create when interacting with cTrader Open API:"
            - list [ref=e145]:
              - listitem [ref=e146]: A custom trading application that funnels new users to create new accounts with a certain broker.
              - listitem [ref=e147]: A Telegram bot that automatically informs your followers of any new trades you may have placed.
              - listitem [ref=e148]: An app for wearables that displays the current P&L of the five most recent positions opened by the user.
              - listitem [ref=e149]: A mobile app that gives a market overview by using a generative AI service.
            - paragraph [ref=e150]: As you can see, cTrader Open API is perfect for professional traders who want to engage socially and interact with their followers.
          - heading "Essential functionality ¶" [level=2] [ref=e151]:
            - text: Essential functionality
            - link "¶" [ref=e152] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/#essential-functionality
          - paragraph [ref=e153]: "Here is a non-exhaustive list of what cTrader Open API allows your code to do:"
          - list [ref=e154]:
            - listitem [ref=e155]: Access real-time market data.
            - listitem [ref=e156]: Perform all possible types of trading operations permitted in official cTrader applications.
            - listitem [ref=e157]: Retrieve and process information about past, current and pending operations (including deals, orders and positions).
          - paragraph [ref=e158]:
            - text: As shown in our
            - link "Terms of use" [ref=e159] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/terms-of-use/
              - strong [ref=e160]: Terms of use
            - text: ", the API can be accessed by anyone with a cTID, and, by default, it is supported by all trading accounts of any cTrader-affiliated brokers."
          - generic [ref=e161]:
            - paragraph [ref=e162]: Rate limiting
            - paragraph [ref=e163]: Note that some limits exist on how frequently you can perform certain requests to the cTrader backend.
            - list [ref=e164]:
              - listitem [ref=e165]: You can perform a maximum of 50 requests per second per connection for any non-historical data requests.
              - listitem [ref=e166]: You can perform a maximum of 5 requests per second per connection for any historical data requests.
          - heading "Demo and live trading ¶" [level=2] [ref=e167]:
            - text: Demo and live trading
            - link "¶" [ref=e168] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/#demo-and-live-trading
          - paragraph [ref=e169]: You can use cTrader Open API to trade on behalf of both demo and live accounts.
          - paragraph [ref=e170]: We recommend using demo accounts for development and testing, and then switching to live after making sure that your integration with cTrader Open API works as intended. However, there are no hard restrictions, and you may freely choose to start development and testing under a live account.
          - heading "SDKs ¶" [level=2] [ref=e171]:
            - text: SDKs
            - link "¶" [ref=e172] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/#sdks
          - paragraph [ref=e173]:
            - text: When integrating with the Open API, you can use either JSON or Protobufs for data
            - link "serialisation and deserialisation" [ref=e174] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/protocol-buffers-json/
              - strong [ref=e175]: serialisation and deserialisation
            - text: .
          - paragraph [ref=e176]: You can use any language to implement cTrader Open API. However, if you intend to use Protobufs, we highly recommend using a language that has official SDK support from Spotware. To date, these languages are as follows.
          - list [ref=e177]:
            - listitem [ref=e178]:
              - link "C#" [ref=e179] [cursor=pointer]:
                - /url: https://github.com/spotware/OpenAPI.Net
                - strong [ref=e180]: C#
            - listitem [ref=e181]:
              - link "Python" [ref=e182] [cursor=pointer]:
                - /url: https://github.com/spotware/OpenApiPy
                - strong [ref=e183]: Python
          - paragraph [ref=e184]: Every official SDK listed above contains helper methods and classes that make the implementation of cTrader Open API as smooth as possible.
          - paragraph [ref=e185]: If you intend to use JSON, there is no need to use our SDKs as handling serialisation and deserialisation in this case is relatively simple.
