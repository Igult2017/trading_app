        - article [ref=e162]:
          - heading "Proxies and endpoints ¶" [level=1] [ref=e163]:
            - text: Proxies and endpoints
            - link "¶" [ref=e164] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/proxies-endpoints/#proxies-and-endpoints
          - paragraph [ref=e165]: cTrader Open API exposes access to several proxies located in different regions so that you can minimise latency and ensure that your service functions as smoothly as possible.
          - paragraph [ref=e166]: Fortunately, you do not have to choose the most suitable proxy manually. By leveraging the power of the AWS Global Accelerator, our Open API allows for connecting to just one endpoint; afterwards, your client will be redirected to the closest proxy we have available.
          - heading "Connect to endpoints ¶" [level=2] [ref=e167]:
            - text: Connect to endpoints
            - link "¶" [ref=e168] [cursor=pointer]:
              - /url: https://help.ctrader.com/open-api/proxies-endpoints/#connect-to-endpoints
          - paragraph [ref=e169]: The following endpoints are exposed for connecting to our Open API proxies.
