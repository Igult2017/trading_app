            - paragraph [ref=e189]: Protobuf vs JSON
            - paragraph [ref=e190]:
              - text: Operating with Protobuf always requires a connection to port
              - code [ref=e191]: "5035"
              - text: (and only this port). Operating with JSON always requires a connection with port
              - code [ref=e192]: "5036"
              - text: (and only this port).
          - generic [ref=e193]:
            - paragraph [ref=e194]: Live and demo environments
            - paragraph [ref=e195]:
              - text: Demo and live environments are fully separated. If you connect to a live endpoint, you cannot use demo accounts in your application, and vice versa. If your application needs to operate on behalf of demo and live accounts simultaneously, you would need to
              - link "establish and maintain" [ref=e196] [cursor=pointer]:
                - /url: https://help.ctrader.com/open-api/connection/
                - strong [ref=e197]: establish and maintain
              - text: two separate connections.
